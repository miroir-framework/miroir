# =============================================================================
# Miroir Framework — Docker Compose
# =============================================================================
# Quick-start:
#
#   docker compose up          # build image + start (first run seeds /data)
#   docker compose up -d       # run in background
#   docker compose down        # stop and remove the container
#
# Access the app at http://localhost:3080
#
# The named volume `miroir-data` persists your application data between runs.
# To start fresh:
#   docker compose down -v     # ⚠️ destroys all user data in the volume
#
# Custom server config:
#   Mount your own miroirConfig.server.json to override the baked-in defaults:
#     volumes:
#       - ./my-config/miroirConfig.server.json:/miroir/packages/miroir-server/config/miroirConfig.server.json:ro
# =============================================================================

services:
  miroir:
    image: miroir-framework/miroir:latest
    # pull_policy: build tells Compose to always use the locally-built image and
    # never attempt to pull from a registry, suppressing the spurious
    # "pull access denied" warning when the image doesn't exist remotely.
    pull_policy: build
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      # Host port 3080 → container port 3080
      # Change the left-hand side to expose on a different host port, e.g. "8080:3080"
      - "3080:3080"
    volumes:
      # Named volume for user application data (auto-seeded with demo data on first run)
      - miroir-data:/data
      # TLS certificates — mount the host's mkcert-generated certs so the browser
      # already trusts them.  Run `bash scripts/setup-https.sh` once to generate them,
      # then copy $(mkcert -CAROOT)/rootCA.pem into certs/ before starting.
      # If the ./certs directory is absent the server falls back to plain HTTP.
      - ./certs:/certs:ro
      # Uncomment to override the server config:
      # - ./packages/miroir-server/config/miroirConfig.server.docker.json:/miroir/packages/miroir-server/config/miroirConfig.server.json:ro
    environment:
      # Explicit paths inside the container (match the volume mount above)
      - MIROIR_TLS_CERT=/certs/localhost.pem
      - MIROIR_TLS_KEY=/certs/localhost-key.pem
    restart: unless-stopped

volumes:
  miroir-data:
    driver: local
