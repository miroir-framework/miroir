name: Build Miroir Electron App
description: >
  Builds the Miroir Electron desktop application via `npm run dist`.
  Requires the checkout, build-artefacts-linux, and build-server-binary
  actions to have run first (miroir-standalone-app must already be built).

runs:
  using: composite
  steps:
    - name: Build Electron distributable
      shell: bash
      run: npm run dist -w miroir-standalone-app-electron

    - name: Upload Electron app
      uses: actions/upload-artifact@v4
      with:
        name: miroir-electron-release
        path: packages/miroir-standalone-app-electron/release/
        if-no-files-found: error
