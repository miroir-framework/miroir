name: Build Miroir Server Binary
description: >
  Builds server-side store packages (filesystem, mongodb, postgres), miroir-cli,
  then produces the self-contained server release binary via `npm run build:release`
  (which internally builds miroir-standalone-app and miroir-server).
  Requires the checkout and build-artefacts-linux actions to have run first.

runs:
  using: composite
  steps:
    # Server-side stores not included in build-artefacts-linux (which targets browser/sandbox builds)
    - name: Build server-side store packages
      shell: bash
      run: |
        npm run build -w miroir-store-filesystem &
        npm run build -w miroir-store-mongodb &
        npm run build -w miroir-store-postgres &
        wait

    - name: Build miroir-cli
      shell: bash
      run: npm run build -w miroir-cli

    - name: Produce server release binary
      shell: bash
      run: npm run build:release -w miroir-server

    # ── 6. Upload artefacts ──────────────────────────────────────────────
    - name: Upload server binary
      uses: actions/upload-artifact@v4
      with:
        name: miroir-server-release
        path: packages/miroir-server/release/
        if-no-files-found: error
