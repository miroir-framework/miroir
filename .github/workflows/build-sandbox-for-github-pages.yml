name: Build Miroir Homepage + Sandbox for GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, cancelling in-progress runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      # ── Homepage (no Miroir deps — build first for fast feedback) ────────
      - name: Build miroir-homepage
        shell: bash
        run: npm run build -w miroir-homepage
        env:
          VITE_BASE_URL: /miroir/
      
      # ── Build artefacts (steps 1–4) ───────────────────────────────────────
      - name: Build artefacts (steps 1–4)
        uses: ./.github/actions/build-artefacts-linux

      # ── Build miroir-sandbox (static) ───────────────────────────────────
      - name: Build miroir-sandbox (static)
        run: npm run build:static -w miroir-sandbox
        env:
          VITE_BASE_URL: /miroir/sandbox/

      - name: Assemble Pages artifact
        run: |
          mkdir -p packages/miroir-homepage/dist/sandbox
          cp -r packages/miroir-sandbox/dist/. packages/miroir-homepage/dist/sandbox/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/miroir-homepage/dist

  deploy:
    needs: build
    if: ${{ !github.event.act }} # skip during local actions testing
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4