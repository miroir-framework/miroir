name: Build MAC

on:
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm ci
      - run: npx lerna run devBuild --scope=miroir-standalone-app
      - run: npm run dist-mac -w miroir-standalone-app-electron
      - uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: packages/miroir-standalone-app-electron/release/