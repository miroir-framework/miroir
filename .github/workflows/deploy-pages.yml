# This workflow has been merged into build-demo-for-github-pages.yml.
# actions/deploy-pages requires the artifact to be in the same workflow run.
# Keeping this file disabled to avoid accidental triggering.
name: Deploy Miroir Demo to GitHub Pages (DISABLED)

on:
  workflow_dispatch:
    # Only kept for manual emergency use; normally deploy runs via build-demo-for-github-pages.yml

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, cancelling in-progress runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
