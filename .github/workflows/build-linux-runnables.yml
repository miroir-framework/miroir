name: Build Miroir Runnables (Linux)

# Progressive build: each job uploads its dist outputs as artifacts and
# downstream jobs restore only what they need. This means:
#   - Any single failed job can be retried without rebuilding previous stages.
#   - Jobs at the same level run in parallel.
#   - npm install is repeated per job but is fast thanks to a shared ~/.npm cache.
#     Cache key = runner.os + hash of all package.json files (platform-neutral).
#     The repo's package-lock.json is Windows-generated; it is deleted before every
#     npm install so Linux/macOS optional deps resolve correctly.
#
# Artifact path convention
#   Multi-path uploads (several packages/*/dist): common ancestor = packages/
#     → archive entries are relative to packages/
#     → download with  path: packages
#   Single-path uploads (one packages/PKG/dist):
#     → archive root = contents of that dist dir
#     → download with  path: packages/PKG/dist
#
# Job graph:
#   deploy-packages
#     └─ core
#          └─ shared-libs
#               ├─ standalone-app
#               │    └─ electron
#               └─ server-binary
#                    └─ docker

on:
  workflow_dispatch:
    inputs:
      docker_tag:
        description: 'Docker image tag (leave blank for default: miroir-framework/miroir:latest)'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    shell: bash

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # Job 1 · Schema / deployment packages
  # No dependency on other Miroir packages; must run before miroir-core devBuild.
  # ──────────────────────────────────────────────────────────────────────────────
  deploy-packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Cache npm store (~/.npm)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package.json', 'packages/*/package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-
      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install --no-audit --prefer-dedupe
      - name: Build deployment packages (parallel)
        run: |
          pids=()
          npm run build -w miroir-test-app_deployment-miroir & pids+=($!)
          npm run build -w miroir-test-app_deployment-admin & pids+=($!)
          npm run build -w miroir-test-app_deployment-library & pids+=($!)
          for pid in "${pids[@]}"; do wait "$pid"; done
      - name: Verify deployment package dist dirs
        run: |
          echo "--- miroir-test-app_deployment-miroir ---"
          ls packages/miroir-test-app_deployment-miroir/dist/
          echo "--- miroir-test-app_deployment-admin ---"
          ls packages/miroir-test-app_deployment-admin/dist/
          echo "--- miroir-test-app_deployment-library ---"
          ls packages/miroir-test-app_deployment-library/dist/
      - name: Upload dist – deployment packages
        uses: actions/upload-artifact@v4
        with:
          name: dist-deployment-packages
          path: |
            packages/miroir-test-app_deployment-miroir/dist
            packages/miroir-test-app_deployment-admin/dist
            packages/miroir-test-app_deployment-library/dist
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 2 · miroir-core  (devBuild regenerates TS types from Jzod schemas)
  # ──────────────────────────────────────────────────────────────────────────────
  core:
    runs-on: ubuntu-latest
    needs: deploy-packages
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Cache npm store (~/.npm)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package.json', 'packages/*/package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-
      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install --no-audit --prefer-dedupe
      - name: Restore dist – deployment packages
        uses: actions/download-artifact@v4
        with:
          name: dist-deployment-packages
          path: packages
      - name: devBuild miroir-core (generates TypeScript types from Jzod schemas)
        run: npm run devBuild -w miroir-core
      - name: Upload dist – miroir-core
        uses: actions/upload-artifact@v4
        with:
          name: dist-miroir-core
          path: packages/miroir-core/dist
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 3 · All shared library packages (browser + server stores + services)
  # All packages here depend only on miroir-core and are built in parallel.
  # Server stores (filesystem/mongodb/postgres) are included here so both
  # server-binary and electron can use them without rebuilding.
  # ──────────────────────────────────────────────────────────────────────────────
  shared-libs:
    runs-on: ubuntu-latest
    needs: core
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Cache npm store (~/.npm)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package.json', 'packages/*/package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-
      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install --no-audit --prefer-dedupe
      - name: Restore dist – deployment packages
        uses: actions/download-artifact@v4
        with:
          name: dist-deployment-packages
          path: packages
      - name: Restore dist – miroir-core
        uses: actions/download-artifact@v4
        with:
          name: dist-miroir-core
          path: packages/miroir-core/dist
      - name: Build local caches and browser stores (parallel)
        run: |
          pids=()
          npm run build -w miroir-localcache & pids+=($!)
          npm run build -w miroir-localcache-redux & pids+=($!)
          npm run build -w miroir-localcache-zustand & pids+=($!)
          npm run build -w miroir-store-bundled & pids+=($!)
          npm run build -w miroir-store-indexedDb & pids+=($!)
          for pid in "${pids[@]}"; do wait "$pid"; done
      - name: Build server stores and service packages (parallel)
        run: |
          pids=()
          npm run build -w miroir-store-filesystem & pids+=($!)
          npm run build -w miroir-store-mongodb & pids+=($!)
          npm run build -w miroir-store-postgres & pids+=($!)
          npm run build -w miroir-ai & pids+=($!)
          npm run build -w miroir-mcp & pids+=($!)
          for pid in "${pids[@]}"; do wait "$pid"; done
      - name: Build miroir-react and miroir-diagram-class
        run: |
          pids=()
          npm run build -w miroir-react & pids+=($!)
          npm run build -w miroir-diagram-class & pids+=($!)
          for pid in "${pids[@]}"; do wait "$pid"; done
      - name: Upload dist – shared libs
        uses: actions/upload-artifact@v4
        with:
          name: dist-shared-libs
          path: |
            packages/miroir-localcache/dist
            packages/miroir-localcache-redux/dist
            packages/miroir-localcache-zustand/dist
            packages/miroir-store-bundled/dist
            packages/miroir-store-indexedDb/dist
            packages/miroir-store-filesystem/dist
            packages/miroir-store-mongodb/dist
            packages/miroir-store-postgres/dist
            packages/miroir-ai/dist
            packages/miroir-mcp/dist
            packages/miroir-react/dist
            packages/miroir-diagram-class/dist
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 4a · miroir-standalone-app (browser SPA)
  # ──────────────────────────────────────────────────────────────────────────────
  standalone-app:
    runs-on: ubuntu-latest
    needs: shared-libs
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Cache npm store (~/.npm)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package.json', 'packages/*/package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-
      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install --no-audit --prefer-dedupe
      - name: Restore dist – deployment packages
        uses: actions/download-artifact@v4
        with:
          name: dist-deployment-packages
          path: packages
      - name: Restore dist – miroir-core
        uses: actions/download-artifact@v4
        with:
          name: dist-miroir-core
          path: packages/miroir-core/dist
      - name: Restore dist – shared libs
        uses: actions/download-artifact@v4
        with:
          name: dist-shared-libs
          path: packages
      - name: Build miroir-standalone-app
        run: npm run build -w miroir-standalone-app
      - name: Upload dist – standalone-app
        uses: actions/upload-artifact@v4
        with:
          name: dist-standalone-app
          path: packages/miroir-standalone-app/dist
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 4b · Server binary
  # Builds miroir-cli then produces the self-contained server release binary.
  # Server-side stores are already available via dist-shared-libs.
  # ──────────────────────────────────────────────────────────────────────────────
  server-binary:
    runs-on: ubuntu-latest
    needs: shared-libs
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Cache npm store (~/.npm)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package.json', 'packages/*/package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-
      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install --no-audit --prefer-dedupe
      - name: Restore dist – deployment packages
        uses: actions/download-artifact@v4
        with:
          name: dist-deployment-packages
          path: packages
      - name: Restore dist – miroir-core
        uses: actions/download-artifact@v4
        with:
          name: dist-miroir-core
          path: packages/miroir-core/dist
      - name: Restore dist – shared libs
        uses: actions/download-artifact@v4
        with:
          name: dist-shared-libs
          path: packages
      - name: Build miroir-cli
        run: npm run build -w miroir-cli
      - name: Produce server release binary
        run: npm run build:release -w miroir-server
      - name: Upload server binary
        uses: actions/upload-artifact@v4
        with:
          name: miroir-server-release
          path: packages/miroir-server/release/
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 5a · Electron desktop application
  # ──────────────────────────────────────────────────────────────────────────────
  electron:
    runs-on: ubuntu-latest
    needs: standalone-app
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Cache npm store (~/.npm)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package.json', 'packages/*/package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-
      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install --no-audit --prefer-dedupe
      - name: Restore dist – deployment packages
        uses: actions/download-artifact@v4
        with:
          name: dist-deployment-packages
          path: packages
      - name: Restore dist – miroir-core
        uses: actions/download-artifact@v4
        with:
          name: dist-miroir-core
          path: packages/miroir-core/dist
      - name: Restore dist – shared libs
        uses: actions/download-artifact@v4
        with:
          name: dist-shared-libs
          path: packages
      - name: Restore dist – standalone-app
        uses: actions/download-artifact@v4
        with:
          name: dist-standalone-app
          path: packages/miroir-standalone-app/dist
      - name: Build Electron distributable
        run: npm run dist -w miroir-standalone-app-electron
      - name: Upload Electron release
        uses: actions/upload-artifact@v4
        with:
          name: miroir-electron-release
          path: packages/miroir-standalone-app-electron/release/
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 5b · Docker container image
  # Only needs the pre-built server binary; no npm packages required.
  # ──────────────────────────────────────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: server-binary
    steps:
      - uses: actions/checkout@v6
      - name: Restore server binary
        uses: actions/download-artifact@v4
        with:
          name: miroir-server-release
          path: packages/miroir-server/release
      - name: Build Docker image
        run: |
          mkdir -p ci/artefacts
          chmod +x ci/docker/build_miroir.sh
          if [[ -n "${{ inputs.docker_tag }}" ]]; then
            ci/docker/build_miroir.sh --tag "${{ inputs.docker_tag }}" .
            docker save "${{ inputs.docker_tag }}" -o ci/artefacts/miroir.tar
          else
            ci/docker/build_miroir.sh .
            docker save miroir-framework/miroir:latest -o ci/artefacts/miroir.tar
          fi
      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: miroir-docker-release
          path: ci/artefacts/miroir.tar
          if-no-files-found: error

