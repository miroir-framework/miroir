<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Miroir Standalone App</title>
    <!-- Material Icons font -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <script type="module" src="/index.tsx"></script>
    <meta name="viewport" content="initial-scale=1, width=device-width" />
    <link rel="icon" type="image/png" href="./assets/miroir-logo.png">
    <style>
      #miroir-bootstrap-spinner {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: #f5f5f5; z-index: 9999;
      }
      .miroir-spinner {
        width: 56px; height: 56px;
        border: 5px solid #cccccc;
        border-top-color: #888888;
        border-radius: 50%;
        animation: miroir-spin 0.9s linear infinite;
      }
      @keyframes miroir-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body style="margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden;">
    <div id="miroir-bootstrap-spinner"><div class="miroir-spinner"></div></div>
    <!-- this is where react renders into -->
    <div id="root"></div>
    <!-- Portal for Glide Data Grid overlay editor -->
    <!-- <div id="portal"></div> -->
     <!-- portal is used by glide-data-grid (and modal windows, too, probably) -->
    <div id="portal" style="position: fixed; left: 0; top: 0; z-index: 9999;" />
    <!-- <style src="../dist/css/main.af8e665e.css"></style>
    <script src="../dist/js/main.dced7bde.js"></script> -->
  </body>
</html>
