<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Miroir Sandbox</title>
    <link rel="icon" href="data:," />
    <style>
      #miroir-bootstrap-spinner {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: #f5f5f5; z-index: 9999;
      }
      .miroir-spinner {
        width: 56px; height: 56px;
        border: 5px solid #cccccc;
        border-top-color: #888888;
        border-radius: 50%;
        animation: miroir-spin 0.9s linear infinite;
      }
      @keyframes miroir-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body style="margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden;">
    <div id="miroir-bootstrap-spinner"><div class="miroir-spinner"></div></div>
    <div id="root"></div>
    <div id="portal" style="position: fixed; left: 0; top: 0; z-index: 9999;" />
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
